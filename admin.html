<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King's Delight — Admin</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231C1C1C'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='%23FFBF00'%3E%F0%9F%91%91%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- ── LOGIN SCREEN ──────────────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-crown"><img src="assets/logo.png" alt="King's Delight" style="width:72px;height:72px;border-radius:50%;border:1.5px solid var(--gold-border);object-fit:cover"></div>
    <h1 class="login-title">King's Delight</h1>
    <p class="login-sub">Admin Panel · Staff Access Only</p>
    <div class="field">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<!-- ── ADMIN PANEL ────────────────────────────────────────────────────────── -->
<div id="adminPanel">
  <header class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-logo-text" style="display:flex;align-items:center;gap:10px">
        <img src="assets/logo.png" alt="logo" style="width:32px;height:32px;border-radius:50%;border:1px solid var(--gold-border);object-fit:cover;flex-shrink:0">
        King's Delight <span>ADMIN</span>
      </div>
      <a href="/" target="_blank" rel="noopener noreferrer" style="font-size:12px;color:var(--cream-35);text-decoration:none;margin-right:8px">View Menu ↗</a>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </header>

  <div class="admin-body">

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">—</div>
        <div class="stat-label">Total Items</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statAvail" style="color:var(--green)">—</div>
        <div class="stat-label">Available</div>
      </div>
      <div class="stat-card oos">
        <div class="stat-num" id="statOOS">—</div>
        <div class="stat-label">Out of Stock</div>
      </div>
      <div class="stat-card promo">
        <div class="stat-num" id="statPromo">—</div>
        <div class="stat-label">Active Promos</div>
      </div>
    </div>

    <!-- Add New Product Form -->
    <div class="add-promo-card">
      <div class="add-promo-title">➕ Add New Product</div>
      <div class="form-grid">
        <div class="form-field">
          <label for="promoName">Item Name *</label>
          <input type="text" id="promoName" placeholder="e.g. King's Meal">
        </div>
        <div class="form-field">
          <label for="promoPrice">Price (₦) *</label>
          <input type="number" id="promoPrice" placeholder="e.g. 4500" min="0">
        </div>
        <div class="form-field">
          <label for="promoSection">Section *</label>
          <select id="promoSection">
            <option value="specials">Chef's Specials</option>
            <option value="mains">Mains</option>
            <option value="proteins">Proteins</option>
            <option value="grill">Grill Zone</option>
            <option value="swallow">Swallow</option>
            <option value="soups">Soups</option>
            <option value="sides">Sides</option>
            <option value="drinks">Drinks</option>
            <option value="pastries">Pastries</option>
            <option value="promos">Promos</option>
          </select>
        </div>
        <div class="form-field">
          <label for="promoSublabel">Sub-label (optional)</label>
          <input type="text" id="promoSublabel" placeholder="e.g. House favourite">
        </div>
        <div class="form-field">
          <label for="promoExpiry">Promo Expiry (optional)</label>
          <input type="date" id="promoExpiry">
        </div>
        <div class="form-field">
          <div class="form-checkbox" style="margin-top:22px">
            <input type="checkbox" id="promoIsCombo">
            <label for="promoIsCombo">Combo / meal deal</label>
          </div>
        </div>
      </div>
      <button class="add-promo-btn" id="addPromoBtn" onclick="addPromoItem()">Add Product</button>
    </div>

    <!-- Search -->
    <div style="margin-bottom:14px;position:relative">
      <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;opacity:0.4;pointer-events:none">🔍</span>
      <input type="text" id="adminSearch" placeholder="Search items…" oninput="doAdminSearch(this.value)"
        style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:20px;padding:8px 16px 8px 38px;color:var(--cream);font-family:'Jost',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s"
        onfocus="this.style.borderColor='var(--gold-border)'" onblur="this.style.borderColor='var(--border)'">
    </div>

    <!-- Filters -->
    <div class="filter-row" id="filterRow">
      <button class="filter-btn active" onclick="setFilter('all', this)">All Items</button>
      <button class="filter-btn" onclick="setFilter('unavailable', this)">Out of Stock</button>
      <button class="filter-btn" onclick="setFilter('promos', this)">Promos</button>
    </div>

    <!-- Item List -->
    <div id="itemList"><div class="loading-msg">Loading menu…</div></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="admin.js"></script>
</body>
</html>
